services:
  server:
    container_name: raizes-do-nordeste
    build: .

    ports:
      - "5298:5298"

    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5298
      - ConnectionStrings__Connection=Server=db;Database=RaizesDoNordeste;User Id=sa;Password=p@55w0rd;TrustServerCertificate=True
      - Settings__Jwt__SigningKey=Ws48-h0@TSM1RK6\\y£rIPyXIVt+mX2Y$
      - Settings__Jwt__ExpiresMinutes=1000

    depends_on:
      db:
        condition: service_healthy

  db:
    image: mcr.microsoft.com/mssql/server:2025-latest

    container_name: sql_server

    ports:
      - "1433:1433"

    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=p@55w0rd

    volumes:
      - sql-server-data:/var/opt/mssql

    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "p@55w0rd", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sql-server-data: